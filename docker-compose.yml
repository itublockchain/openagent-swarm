services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "3001:3001"
    # All env vars are baked into backend/api/Dockerfile so a fresh
    # checkout works without any local .env. To override individual
    # values for a non-default deploy (e.g. ngrok URLs, multisig
    # operator), add them under `environment:` here — compose values
    # win over Dockerfile ENV at runtime.
    #
    # Operator key is interpolated from root .env so the contract
    # operator can be rotated without rebuilding the image. The image's
    # baked PRIVATE_KEY is a faucet-grade dev key; if you redeploy
    # contracts with a different deployer EOA, set PRIVATE_KEY in .env
    # to that key (same address must be `operator` on Treasury+Gateway,
    # otherwise BridgeWatcher.creditBalance reverts "not operator").
    # L2_PRIVATE_KEY mirrors PRIVATE_KEY — both are read by chain.ts /
    # AgentRunner; keeping them aligned avoids a split-brain wallet.
    environment:
      PRIVATE_KEY: ${PRIVATE_KEY}
      L2_PRIVATE_KEY: ${PRIVATE_KEY}
      AGENT_PRIVATE_KEY: ${AGENT_PRIVATE_KEY:-${PRIVATE_KEY}}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agents-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      docker-proxy:
        condition: service_started
      axl-seed:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - api

  # Default agent service. The frontend deploy flow spawns additional
  # agents with their own generated wallets via Dockerode; this entry is
  # the always-on baseline that uses the API wallet.
  agent:
    image: swarm-agent:latest
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    # Same as `api`: all env vars baked into backend/agent/Dockerfile.
    # Override individual values via `environment:` if you need a
    # different agent identity / wallet for this baseline service.
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
      axl-seed:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - agent

  axl-seed:
    build:
      context: ./axl
      dockerfile: containerfiles/Dockerfile
    ports:
      - "7100:7000"
      - "9002:9002"
    # Generate the ed25519 identity on first boot and persist it in the
    # axl-keys volume so the node's public key stays stable across
    # `docker compose down/up`. axl is a git submodule, so we keep this
    # bootstrap out of the upstream image and apply it via entrypoint
    # override here. The symlink puts the key where node-config.json
    # expects it (`PrivateKeyPath: private.pem`, WORKDIR /app).
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /keys/private.pem ]; then
          apk add --no-cache openssl >/dev/null
          openssl genpkey -algorithm ed25519 -out /keys/private.pem
          echo "[axl-seed] generated new private.pem"
        fi
        ln -sf /keys/private.pem /app/private.pem
        exec ./node -config node-config.json
    volumes:
      - axl-keys:/keys
    # Bridge readiness probe. Without this, api/agent boot before AXL's
    # HTTP bridge accepts requests and AxlNetwork.connect() throws on the
    # first /topology fetch — leaving processes inert until manual restart.
    # /topology is the cheapest "alive" endpoint the bridge exposes.
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://127.0.0.1:9002/topology > /dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      swarm_default:
        aliases:
          - axl-seed

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      swarm_default:
        aliases:
          - docker-proxy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    # NEXT_PUBLIC_* are inlined at `next build` from frontend/Dockerfile
    # ENV. To target a different backend (ngrok, sporeprotocol.xyz),
    # rebuild with `docker compose build --build-arg` or edit the
    # Dockerfile values directly — runtime `environment:` won't help
    # because the bundle is already compiled.
    depends_on:
      api:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - frontend

networks:
  swarm_default:
    name: swarm_default

volumes:
  # Persists API-side agent secrets (encrypted private keys, container ids)
  # across `docker compose down/up` so the pool can be reconstructed on the
  # next boot. Loss of this volume = loss of agent control (on-chain entries
  # would be marked ERROR by the orphan sweep on next start).
  agents-data:
    name: swarm_agents_data
  # ed25519 identity for axl-seed. Generated on first boot by the
  # axl-seed entrypoint; loss of this volume = node gets a new
  # public key and any peers that hard-coded the old one will stop
  # routing to it.
  axl-keys:
    name: swarm_axl_keys
