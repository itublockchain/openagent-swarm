services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - AXL_PEER=tcp://axl-seed:7000
      - AXL_URL=http://localhost:9002
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - OG_RPC_URL=${OG_RPC_URL:-https://evmrpc-testnet.0g.ai}
      - L2_USDC_ADDRESS=${L2_USDC_ADDRESS}
      - L2_ESCROW_ADDRESS=${L2_ESCROW_ADDRESS}
      - L2_DAG_REGISTRY_ADDRESS=${L2_DAG_REGISTRY_ADDRESS}
      - L2_SLASHING_VAULT_ADDRESS=${L2_SLASHING_VAULT_ADDRESS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - docker-proxy
      - axl-seed
    networks:
      swarm_default:
        aliases:
          - api

  # Default agent service. The frontend deploy flow spawns additional
  # agents with their own generated wallets via Dockerode; this entry is
  # the always-on baseline that uses the API wallet.
  agent:
    image: swarm-agent:latest
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    env_file: .env
    environment:
      - AGENT_ID=${AGENT_ID:-agent-1}
      - USE_MOCK=${USE_MOCK:-false}
      - COMPUTE_PROVIDER=0g
      - ZG_COMPUTE_RPC_URL=${ZG_COMPUTE_RPC_URL:-https://evmrpc-testnet.0g.ai}
      - ZG_COMPUTE_MODEL=${ZG_COMPUTE_MODEL:-qwen/qwen-2.5-7b-instruct}
      - AGENT_PRIVATE_KEY=${AGENT_PRIVATE_KEY}
      - AXL_PEER=tcp://axl-seed:7000
      - AXL_URL=http://localhost:9002
      - OG_RPC_URL=${OG_RPC_URL:-https://evmrpc-testnet.0g.ai}
      # Pulled from .env so a contract redeploy doesn't strand this container
      # on a stale address. Previously hardcoded — caused "Task does not
      # exist" reverts whenever contracts were redeployed.
      - L2_USDC_ADDRESS=${L2_USDC_ADDRESS}
      - L2_ESCROW_ADDRESS=${L2_ESCROW_ADDRESS}
      - L2_DAG_REGISTRY_ADDRESS=${L2_DAG_REGISTRY_ADDRESS}
      - L2_SLASHING_VAULT_ADDRESS=${L2_SLASHING_VAULT_ADDRESS}
    restart: on-failure
    depends_on:
      api:
        condition: service_healthy
      axl-seed:
        condition: service_started
    networks:
      swarm_default:
        aliases:
          - agent

  axl-seed:
    build:
      context: ./axl
      dockerfile: containerfiles/Dockerfile
    ports:
      - "7100:7000"
      - "9002:9002"
    networks:
      swarm_default:
        aliases:
          - axl-seed

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      swarm_default:
        aliases:
          - docker-proxy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001/ws}
    depends_on:
      api:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - frontend

networks:
  swarm_default:
    name: swarm_default
