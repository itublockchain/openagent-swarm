services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      POST: 1
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
      AUTH: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - docker-proxy

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - ZG_STORAGE_URL=${ZG_STORAGE_URL}
      - ZG_COMPUTE_URL=${ZG_COMPUTE_URL}
      - ZG_COMPUTE_API_KEY=${ZG_COMPUTE_API_KEY}
      - AXL_WS_URL=${AXL_WS_URL}
      - L2_RPC_URL=${L2_RPC_URL}
      - L2_PRIVATE_KEY=${L2_PRIVATE_KEY}
      - L2_ESCROW_ADDRESS=${L2_ESCROW_ADDRESS}
      - L2_DAG_REGISTRY_ADDRESS=${L2_DAG_REGISTRY_ADDRESS}
    depends_on:
      - docker-proxy
    networks:
      - internal

  agent:
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    deploy:
      replicas: 0 # API triggers deployment via Dockerode
    networks:
      - internal

networks:
  internal:
    driver: bridge
