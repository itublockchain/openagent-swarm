services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    expose:
      - "3001"
    # Runtime env precedence (highest first):
    #   1. compose `environment:` (none below — left for ad-hoc overrides)
    #   2. `env_file: .env` — every key from the repo-root .env lands here
    #   3. Dockerfile ENV literals (fresh-checkout defaults)
    # `required: false` so a clean clone with no .env still boots — the
    # Dockerfile defaults carry the run.
    env_file:
      - path: .env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spore_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      # Boot-time grace window. The API's startup chain (AXL bridge wait +
      # storage init + ZG compute pool + listen()) reliably finishes inside
      # ~30s on warm caches but can stretch on a cold node. start_period
      # lets the container stay "starting" instead of "unhealthy" during
      # the window, so a slow boot doesn't trip restart: unless-stopped or
      # cascade into "dependency failed" on frontend/agent.
      start_period: 60s
    depends_on:
      docker-proxy:
        condition: service_started
      axl-seed:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - api

  axl-seed:
    build:
      context: ./axl
      dockerfile: containerfiles/Dockerfile
    expose:
      - "7000"
      - "9002"
    # Generate the ed25519 identity on first boot and persist it in the
    # axl-keys volume so the node's public key stays stable across
    # `docker compose down/up`. axl is a git submodule, so we keep this
    # bootstrap out of the upstream image and apply it via entrypoint
    # override here. The symlink puts the key where node-config.json
    # expects it (`PrivateKeyPath: private.pem`, WORKDIR /app).
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /keys/private.pem ]; then
          apk add --no-cache openssl >/dev/null
          openssl genpkey -algorithm ed25519 -out /keys/private.pem
          echo "[axl-seed] generated new private.pem"
        fi
        ln -sf /keys/private.pem /app/private.pem
        exec ./node -config node-config.json
    volumes:
      - axl-keys:/keys
    # Bridge readiness probe. Without this, api/agent boot before AXL's
    # HTTP bridge accepts requests and AxlNetwork.connect() throws on the
    # first /topology fetch — leaving processes inert until manual restart.
    # /topology is the cheapest "alive" endpoint the bridge exposes.
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://127.0.0.1:9002/topology > /dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      swarm_default:
        aliases:
          - axl-seed

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      swarm_default:
        aliases:
          - docker-proxy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # NEXT_PUBLIC_* values get inlined into the JS bundle at `next build`
      # — they have to land as build args, not runtime env. Compose pulls
      # `${NEXT_PUBLIC_*}` from the repo-root .env automatically; any var
      # missing from .env falls through to the ARG default in the Dockerfile,
      # so a fresh clone with no .env still builds against the local-docker
      # / 0G-testnet defaults.
      #
      # To deploy against a different backend, set the vars in your .env and
      # run `docker compose build frontend --no-cache`. The --no-cache is
      # required: docker only invalidates the cache when ARG VALUES change
      # in the Dockerfile, not when --build-arg or compose args change.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001/ws}
        NEXT_PUBLIC_NETWORK_ID: ${NEXT_PUBLIC_NETWORK_ID:-16600}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${NEXT_PUBLIC_REOWN_PROJECT_ID}
        NEXT_PUBLIC_USDC_ADDRESS: ${NEXT_PUBLIC_USDC_ADDRESS}
        NEXT_PUBLIC_ESCROW_ADDRESS: ${NEXT_PUBLIC_ESCROW_ADDRESS}
        NEXT_PUBLIC_TREASURY_ADDRESS: ${NEXT_PUBLIC_TREASURY_ADDRESS}
        NEXT_PUBLIC_GATEWAY_ADDRESS: ${NEXT_PUBLIC_GATEWAY_ADDRESS}
        NEXT_PUBLIC_CCTP_RECEIVER_ADDRESS: ${NEXT_PUBLIC_CCTP_RECEIVER_ADDRESS}
        # Per-chain RPC overrides for the wallet (DepositModal, etc).
        # Optional — wagmi.ts already falls back to publicnode.com and the
        # chain-default RPC if these are unset, but a paid Alchemy/Infura
        # endpoint massively improves reliability under load. Set in
        # Dokploy/Coolify env to bake into the bundle at build time.
        NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL}
        NEXT_PUBLIC_ETH_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_ETH_SEPOLIA_RPC_URL}
        NEXT_PUBLIC_ARB_SEPOLIA_RPC_URL: ${NEXT_PUBLIC_ARB_SEPOLIA_RPC_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - frontend

networks:
  swarm_default:
    name: swarm_default

volumes:
  # Persists API-side agent secrets (encrypted private keys, container ids)
  # across `docker compose down/up` so the pool can be reconstructed on the
  # next boot. Loss of this volume = loss of agent control (on-chain entries
  # would be marked ERROR by the orphan sweep on next start).
  agents-data:
    name: swarm_agents_data
  # ed25519 identity for axl-seed. Generated on first boot by the
  # axl-seed entrypoint; loss of this volume = node gets a new
  # public key and any peers that hard-coded the old one will stop
  # routing to it.
  axl-keys:
    name: swarm_axl_keys

  spore_data:
    name: spore_api_data
