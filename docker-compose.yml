services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - redis
    networks:
      - swarm_default

  agent:
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    env_file: .env
    environment:
      - USE_MOCK=${USE_MOCK:-true}
    restart: on-failure
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swarm_default

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm_default

networks:
  swarm_default:
    name: swarm_default
