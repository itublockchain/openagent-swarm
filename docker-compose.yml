services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - REDIS_URL=redis://redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - redis
      - docker-proxy
    networks:
      swarm_default:
        aliases:
          - api

  agent:
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    env_file: .env
    environment:
      - USE_MOCK=${USE_MOCK:-true}
      - REDIS_URL=redis://redis:6379
    restart: on-failure
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - agent

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      swarm_default:
        aliases:
          - redis

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      swarm_default:
        aliases:
          - docker-proxy

networks:
  swarm_default:
    name: swarm_default
