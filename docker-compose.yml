services:

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - AXL_URL=http://axl:9002
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - docker-proxy
    networks:
      swarm_default:
        aliases:
          - api

  agent:
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    env_file: .env
    environment:
      - USE_MOCK=${USE_MOCK:-true}
      - AXL_URL=http://axl:9002
    restart: on-failure
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy
    networks:
      swarm_default:
        aliases:
          - agent

  axl:
    build:
      context: ./axl
      dockerfile: containerfiles/Dockerfile
    ports:
      - "9001:9001"
      - "9002:9002"
    networks:
      swarm_default:
        aliases:
          - axl

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      swarm_default:
        aliases:
          - docker-proxy

networks:
  swarm_default:
    name: swarm_default
