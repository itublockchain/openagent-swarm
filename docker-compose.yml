services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      POST: 1
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
      AUTH: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - docker-proxy

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - DOCKER_HOST=tcp://docker-proxy:2375
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      docker-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - internal

  agent:
    build:
      context: .
      dockerfile: backend/agent/Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
      - AGENT_ID=agent-$${HOSTNAME}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

